name: Weekly venue discovery

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 1"

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Discover and reconcile venues
        run: npm run venues:discover
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VENUE_DISCOVERY_SCOPES: "Madrid,Barcelona,Valencia,Sevilla,Zaragoza,Málaga,Murcia,Palma,Bilbao,Alicante,Córdoba,Valladolid,Vigo,Gijón,A Coruña,Granada,Vitoria-Gasteiz,Oviedo,Pamplona,Santander,San Sebastián,Salamanca,Logroño,Badajoz,Huelva,Lleida,Tarragona,León,Cádiz,Jaén,Ourense,Girona,Lugo,Santiago de Compostela,Cáceres,Guadalajara,Toledo,Pontevedra,Palencia,Zamora,Ávila,Segovia,Soria,Cuenca,Teruel,Huesca,Ciudad Real,Albacete,Almería,Castellón de la Plana,Santa Cruz de Tenerife,Las Palmas de Gran Canaria,Ceuta,Melilla"
          SCRAPER_TIMEOUT_MS: "30000"
